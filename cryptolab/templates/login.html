<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CryptoLab</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236366f1'%3E%3Cpath d='M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.4 0 2.8 1.1 2.8 2.5V11c.6.6 1 1.3 1 2.2 0 1.8-1.3 3.2-3 3.2s-3-1.4-3-3.2c0-.9.4-1.6 1-2.2V9.5C10.8 8.1 10.6 7 12 7z'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(30, 30, 60, 0.6);
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #06b6d4;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.06; pointer-events: none;
        }

        nav, .auth-container { position: relative; z-index: 1; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 2rem; background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }

        .logo {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 1.2rem; font-weight: 700; color: var(--accent-tertiary);
            text-decoration: none;
        }

        .logo svg { width: 22px; height: 22px; fill: var(--accent-primary); }

        .nav-links { display: flex; gap: 1.5rem; }
        .nav-link {
            color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;
            font-weight: 500; transition: color 0.2s;
        }
        .nav-link:hover, .nav-link.active { color: var(--accent-tertiary); }

        .auth-container {
            max-width: 420px; margin: 4rem auto; padding: 0 1.5rem;
        }

        .auth-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 2.5rem; backdrop-filter: blur(12px);
        }

        .auth-card h1 {
            font-size: 1.6rem; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .auth-card .subtitle {
            color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block; font-size: 0.8rem; font-weight: 500;
            color: var(--text-secondary); margin-bottom: 0.4rem;
        }

        .form-input {
            width: 100%; padding: 0.7rem 1rem; background: rgba(15, 15, 35, 0.8);
            border: 1px solid var(--border-color); border-radius: 8px;
            color: var(--text-primary); font-size: 0.9rem; font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none; border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .btn-primary {
            width: 100%; padding: 0.75rem; border: none; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white; font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; margin-top: 0.5rem;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        .auth-footer {
            text-align: center; margin-top: 1.5rem; color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .auth-footer a { color: var(--accent-tertiary); text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }

        .messages { margin-bottom: 1.25rem; list-style: none; }
        .messages li {
            padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 0.5rem;
        }
        .messages .error {
            background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5;
        }
        .messages .success {
            background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7;
        }
    </style>
</head>

<body>
    <canvas id="matrix-canvas"></canvas>
    <nav>
        <a href="/" class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.4 0 2.8 1.1 2.8 2.5V11c.6.6 1 1.3 1 2.2 0 1.8-1.3 3.2-3 3.2s-3-1.4-3-3.2c0-.9.4-1.6 1-2.2V9.5C10.8 8.1 10.6 7 12 7z" />
            </svg>
            <span>CryptoLab</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Encrypt</a>
            <a href="/learn/" class="nav-link">Learn</a>
            <a href="/security/" class="nav-link">Security</a>
            <a href="/about/" class="nav-link">About</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to save your encryption history</p>

            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" name="username" id="login-username" class="form-input" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" name="password" id="login-password" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{% url 'register' %}">Create one</a>
            </div>
        </div>
    </div>

    <script>
        // Matrix rain
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const columns = Math.floor(canvas.width / 14);
        const drops = Array(columns).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#6366f1';
            ctx.font = '12px monospace';
            for (let i = 0; i < drops.length; i++) {
                const char = String.fromCharCode(0x30 + Math.random() * 10);
                ctx.fillText(char, i * 14, drops[i] * 14);
                if (drops[i] * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
