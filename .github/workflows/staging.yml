name: Staging Pipeline

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]

jobs:
  security_scan:
    name: Container Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: cryptolab:scan

      - name: Scan Python dependencies (blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'cryptolab:scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'library'

      - name: Scan OS packages (advisory only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'cryptolab:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os'

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
        continue-on-error: true

  docker_build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: security_scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cryptolab:latest

  dast_scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: docker_build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Render redeployment
        run: |
          echo "Waiting 3 minutes for Render to pull new image..."
          sleep 180

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'https://cryptolab-sxo4.onrender.com'
          rules_file_name: 'zap/rules.tsv'
          cmd_options: '-I'
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
        continue-on-error: true

  load_test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    needs: docker_build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Render redeployment
        run: |
          echo "Waiting 3 minutes for Render to pull new image..."
          sleep 180

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/load-test.js
        env:
          TARGET_URL: 'https://cryptolab-sxo4.onrender.com'
        continue-on-error: true

      - name: Upload k6 Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: summary.json
        continue-on-error: true

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [security_scan, docker_build]
    if: always()
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # --- Metadata ---
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_MSG=$(echo "$COMMIT_MSG" | head -n 1 | sed 's/"/\\\x22/g')
          RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          
          # --- Links ---
          DOCKER_URL="https://hub.docker.com/repository/docker/idkjustletmein/cryptolab/general"
          RENDER_URL="https://cryptolab-sxo4.onrender.com"
          
          # --- Status Icons ---
          PASS_ICON="✅"
          FAIL_ICON="❌"
          SKIP_ICON="⏭️"
          CANCEL_ICON="🚫"
          
          # --- Stage: Security Scan ---
          if [ "${{ needs.security_scan.result }}" == "success" ]; then
            SECURITY_STATUS="$PASS_ICON **Container Security (Trivy)**\\nNo CRITICAL/HIGH vulnerabilities found"
          elif [ "${{ needs.security_scan.result }}" == "skipped" ]; then
            SECURITY_STATUS="$SKIP_ICON **Container Security (Trivy)**\\nSkipped"
          elif [ "${{ needs.security_scan.result }}" == "cancelled" ]; then
            SECURITY_STATUS="$CANCEL_ICON **Container Security (Trivy)**\\nCancelled"
          else
            SECURITY_STATUS="$FAIL_ICON **Container Security (Trivy)**\\nVulnerabilities detected — image push blocked"
          fi
          
          # --- Stage: Docker Build ---
          if [ "${{ needs.docker_build.result }}" == "success" ]; then
             DOCKER_STATUS="$PASS_ICON **Docker Build**\\nImage pushed to Hub\\n[View Image]($DOCKER_URL)"
             DEPLOY_STATUS="$PASS_ICON **Deployment**\\nAuto-triggered via Render\\n[View Site]($RENDER_URL)"
          elif [ "${{ needs.docker_build.result }}" == "skipped" ]; then
             DOCKER_STATUS="$SKIP_ICON **Docker Build**\\nSkipped (security scan failed)"
             DEPLOY_STATUS="$SKIP_ICON **Deployment**\\nBlocked"
          elif [ "${{ needs.docker_build.result }}" == "cancelled" ]; then
             DOCKER_STATUS="$CANCEL_ICON **Docker Build**\\nCancelled by user"
             DEPLOY_STATUS="$CANCEL_ICON **Deployment**\\nCancelled"
          else
             DOCKER_STATUS="$FAIL_ICON **Docker Build**\\nFailed"
             DEPLOY_STATUS="$SKIP_ICON **Deployment**\\nBlocked"
          fi

          # --- Stage: OWASP ZAP ---
          if [ "${{ needs.dast_scan.result }}" == "success" ]; then
            ZAP_STATUS="$PASS_ICON **OWASP ZAP DAST**\\nBaseline scan completed — no critical alerts"
          elif [ "${{ needs.dast_scan.result }}" == "skipped" ]; then
            ZAP_STATUS="$SKIP_ICON **OWASP ZAP DAST**\\nSkipped"
          else
            ZAP_STATUS="$FAIL_ICON **OWASP ZAP DAST**\\nScan completed with findings (see artifacts)"
          fi

          # --- Stage: k6 Load Test ---
          if [ "${{ needs.load_test.result }}" == "success" ]; then
            K6_STATUS="$PASS_ICON **k6 Load Test**\\nAll thresholds passed"
          elif [ "${{ needs.load_test.result }}" == "skipped" ]; then
            K6_STATUS="$SKIP_ICON **k6 Load Test**\\nSkipped"
          else
            K6_STATUS="$FAIL_ICON **k6 Load Test**\\nThreshold breached (see artifacts)"
          fi

          # --- Overall Status & Color ---
          # Only report success when ALL jobs actually succeeded
          if [ "${{ needs.security_scan.result }}" == "success" ] && [ "${{ needs.docker_build.result }}" == "success" ]; then
             COLOR=5763719 # Green
             TITLE="🚀 Staging Pipeline Success"
             DESC="New version deployed successfully! 🎉"
             DETAILS_FIELD=""
          else
             COLOR=15548997 # Red
             
             # Distinguish between cancelled and failed
             if [ "${{ needs.security_scan.result }}" == "cancelled" ] || [ "${{ needs.docker_build.result }}" == "cancelled" ]; then
               TITLE="🚀 Staging Pipeline Cancelled"
               DESC="Pipeline was cancelled before completion."
             else
               TITLE="🚀 Staging Pipeline Failed"
               DESC="One or more stages failed. Deployment blocked."
             fi
             
             DETAILS_FIELD=""
          fi
          
          # --- Calculate Duration ---
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          START_TIME=$(gh run view ${{ github.run_id }} --repo ${{ github.repository }} --json startedAt --jq '.startedAt')
          
          START_TS=$(date -d "$START_TIME" +%s)
          NOW_TS=$(date +%s)
          DURATION_SEC=$((NOW_TS - START_TS))
          
          MIN=$((DURATION_SEC / 60))
          SEC=$((DURATION_SEC % 60))
          DURATION_STR="⏱️ ${MIN}m ${SEC}s"
          
          # --- Construct Payload ---
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "$TITLE",
              "description": "$DESC",
              "color": $COLOR,
              "url": "$RUN_URL",
              "fields": [
                { "name": "Repository", "value": "[$REPO](https://github.com/$REPO)", "inline": true },
                { "name": "Branch", "value": "$BRANCH", "inline": true },
                { "name": "Commit", "value": "[$SHORT_SHA]($RUN_URL)", "inline": true },
                
                { "name": "Stage Summary", "value": "────────────────────────────────────────", "inline": false },
                { "name": "📝 Commit", "value": "$COMMIT_MSG", "inline": false },
                { "name": "", "value": "────────────────────────────────────────", "inline": false },
                
                { "name": "", "value": "$SECURITY_STATUS", "inline": false },
                { "name": "", "value": "🔹", "inline": false },
                { "name": "", "value": "$DOCKER_STATUS", "inline": false },
                { "name": "", "value": "🔹", "inline": false },
                { "name": "", "value": "$DEPLOY_STATUS", "inline": false },
                { "name": "", "value": "🔹", "inline": false },
                { "name": "", "value": "$ZAP_STATUS", "inline": false },
                { "name": "", "value": "🔹", "inline": false },
                { "name": "", "value": "$K6_STATUS", "inline": false },
                
                { "name": "", "value": "────────────────────────────────────────", "inline": false },
                { "name": "Total Duration", "value": "$DURATION_STR", "inline": false }
                $DETAILS_FIELD
              ],
              "footer": { "text": "Staging Pipeline • Run #${{ github.run_number }} • Triggered by $ACTOR" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"

