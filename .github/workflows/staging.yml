name: Staging Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:

  # ═══════════════════════════════════════════════════════════
  # SAST SCAN (Updates Main Branch Metrics)
  # ═══════════════════════════════════════════════════════════

  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    env:
      DEBUG: 'True'
      DJANGO_SECRET_KEY: 'test-key-for-pytest-only'
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests with coverage
        run: |
          pytest --cov=cryptolab --cov-report=xml
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  # ═══════════════════════════════════════════════════════════
  # SECURITY SCAN
  # ═══════════════════════════════════════════════════════════

  security_scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy
          
      - name: Run Trivy vulnerability scanner in fs mode
        run: |
          trivy fs . --severity CRITICAL,HIGH --format table --exit-code 1

      - name: Upload Trivy Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════
  # DOCKER BUILD & PUSH (Only if scan passes)
  # ═══════════════════════════════════════════════════════════

  docker_build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [security_scan, sonarcloud]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cryptolab:latest
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}

  # ═══════════════════════════════════════════════════════════
  # VERIFY DEPLOYMENT
  # ═══════════════════════════════════════════════════════════

  verify_deployment:
    name: Verify Zero-Downtime Deploy
    runs-on: ubuntu-latest
    needs: [docker_build]
    
    steps:
      - name: Wait for Render Deployment
        run: |
          TARGET_COMMIT="${{ github.sha }}"
          HEALTH_URL="https://cryptolab-sxo4.onrender.com/health/"
          echo "Waiting for Render to deploy commit: $TARGET_COMMIT"
          
          MAX_RETRIES=20
          RETRY_INTERVAL=15
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            RESPONSE=$(curl -s "$HEALTH_URL" || echo '{"commit": "error"}')
            LIVE_COMMIT=$(echo "$RESPONSE" | jq -r '.commit' 2>/dev/null || echo "parse_error")
            
            echo "Live commit is: $LIVE_COMMIT"
            
            if [ "$LIVE_COMMIT" = "$TARGET_COMMIT" ]; then
              echo "✅ Deployment successful! Live commit matches."
              exit 0
            fi
            
            echo "Waiting $RETRY_INTERVAL seconds..."
            sleep $RETRY_INTERVAL
          done
          
          echo "❌ Deployment failed! Live commit never updated to $TARGET_COMMIT."
          echo "This usually means the deployment crashed on startup (e.g., failed health check, bad environment variables) and Render kept the old version running."
          exit 1

  # ═══════════════════════════════════════════════════════════
  # NOTIFICATION
  # ═══════════════════════════════════════════════════════════

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [security_scan, sonarcloud, docker_build, verify_deployment]
    if: always()
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # --- Metadata ---
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_MSG=$(echo "$COMMIT_MSG" | head -n 1 | sed 's/"/\\\x22/g')
          RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          
          # --- Links ---
          DOCKER_URL="https://hub.docker.com/repository/docker/idkjustletmein/cryptolab/general"
          RENDER_URL="https://cryptolab-sxo4.onrender.com"
          
          # --- Status Icons ---
          PASS_ICON="✅"
          FAIL_ICON="❌"
          SKIP_ICON="⏭️"
          CANCEL_ICON="🚫"
          
          # --- Stage: Security Scan ---
          if [ "${{ needs.security_scan.result }}" == "success" ]; then
            SECURITY_STATUS="$PASS_ICON **Container Security (Trivy)**\\nNo CRITICAL/HIGH vulnerabilities found"
          elif [ "${{ needs.security_scan.result }}" == "skipped" ]; then
            SECURITY_STATUS="$SKIP_ICON **Container Security (Trivy)**\\nSkipped"
          elif [ "${{ needs.security_scan.result }}" == "cancelled" ]; then
            SECURITY_STATUS="$CANCEL_ICON **Container Security (Trivy)**\\nCancelled"
          else
            SECURITY_STATUS="$FAIL_ICON **Container Security (Trivy)**\\nVulnerabilities detected — image push blocked"
          fi
          
          # --- Stage: Docker Build ---
          if [ "${{ needs.docker_build.result }}" == "success" ]; then
             DOCKER_STATUS="$PASS_ICON **Docker Build**\\nImage pushed to Hub\\n[View Image]($DOCKER_URL)"
          elif [ "${{ needs.docker_build.result }}" == "skipped" ]; then
             DOCKER_STATUS="$SKIP_ICON **Docker Build**\\nSkipped"
          elif [ "${{ needs.docker_build.result }}" == "cancelled" ]; then
             DOCKER_STATUS="$CANCEL_ICON **Docker Build**\\nCancelled by user"
          else
             DOCKER_STATUS="$FAIL_ICON **Docker Build**\\nFailed"
          fi
          
          # --- Stage: Deployment Verification ---
          if [ "${{ needs.verify_deployment.result }}" == "success" ]; then
             DEPLOY_STATUS="$PASS_ICON **Deployment**\\nVerified live and healthy\\n[View Site]($RENDER_URL)"
          elif [ "${{ needs.verify_deployment.result }}" == "skipped" ]; then
             DEPLOY_STATUS="$SKIP_ICON **Deployment**\\nSkipped (build failed)"
          elif [ "${{ needs.verify_deployment.result }}" == "cancelled" ]; then
             DEPLOY_STATUS="$CANCEL_ICON **Deployment**\\nCancelled by user"
          else
             DEPLOY_STATUS="$FAIL_ICON **Deployment**\\nDeployment crashed (live commit did not update)\\n[View Site]($RENDER_URL)"
          fi

          # --- Overall Status & Color ---
          # Only report success when ALL jobs actually succeeded
          if [ "${{ needs.security_scan.result }}" == "success" ] && [ "${{ needs.docker_build.result }}" == "success" ] && [ "${{ needs.verify_deployment.result }}" == "success" ]; then
             COLOR=5763719 # Green
             TITLE="🚀 Staging Pipeline Success"
             DESC="New version deployed successfully! 🎉"
             DETAILS_FIELD=""
          else
             COLOR=15548997 # Red
             
             # Distinguish between cancelled and failed
             if [ "${{ needs.security_scan.result }}" == "cancelled" ] || [ "${{ needs.docker_build.result }}" == "cancelled" ]; then
               TITLE="🚀 Staging Pipeline Cancelled"
               DESC="Pipeline was cancelled before completion."
             else
               TITLE="🚀 Staging Pipeline Failed"
               DESC="One or more stages failed. Deployment blocked."
             fi
             
             DETAILS_FIELD=""
          fi
          
          # --- Calculate Duration ---
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          START_TIME=$(gh run view ${{ github.run_id }} --repo ${{ github.repository }} --json startedAt --jq '.startedAt')
          START_TS=$(date -d "$START_TIME" +%s)
          NOW_TS=$(date +%s)
          DURATION_SEC=$((NOW_TS - START_TS))
          MIN=$((DURATION_SEC / 60))
          SEC=$((DURATION_SEC % 60))
          DURATION_STR="⏱️ ${MIN}m ${SEC}s"
          
          # --- Discord JSON Payload ---
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "$TITLE",
              "description": "$DESC",
              "color": $COLOR,
              "url": "$RUN_URL",
              "fields": [
                { "name": "Repository", "value": "[$REPO](https://github.com/$REPO)", "inline": true },
                { "name": "Branch", "value": "$BRANCH", "inline": true },
                { "name": "Commit", "value": "[$SHORT_SHA]($RUN_URL)", "inline": true },
                
                { "name": "Stage Summary", "value": "────────────────────────────────────────", "inline": false },
                { "name": "📝 Commit", "value": "$COMMIT_MSG", "inline": false },
                { "name": "", "value": "────────────────────────────────────────", "inline": false },
                
                { "name": "", "value": "$SECURITY_STATUS", "inline": false },
                { "name": "", "value": "🔹", "inline": false },
                { "name": "", "value": "$DOCKER_STATUS", "inline": false },
                { "name": "", "value": "🔹", "inline": false },
                { "name": "", "value": "$DEPLOY_STATUS", "inline": false },
                
                { "name": "", "value": "────────────────────────────────────────", "inline": false },
                { "name": "Total Duration", "value": "$DURATION_STR", "inline": false }
                $DETAILS_FIELD
              ],
              "footer": { "text": "Staging Pipeline • Run #${{ github.run_number }} • Triggered by $ACTOR" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
